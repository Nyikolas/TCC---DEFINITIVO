<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - UniRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/estilosLogin.css">
    <script src="https://kit.fontawesome.com/5f3658a9e0.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <!-- Abas de Navegação -->
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Cadastra-se</button>
            </div>

            <!-- FORMULÁRIO DE LOGIN -->
            <div id="login" class="tab-content active">
                <div class="login-header">
                    <div class="lumi-logo">
                       <img class="Logo-img" src="src/imagens/Logo.png" alt="Logo">
                    </div>
                    <h2>Bem-vindo de volta!</h2>
                    <p>Entre para continuar sua leitura na UniRead.</p>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label>Usuário</label>
                        <div class="input-field">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="username" placeholder="Seu nome de usuário" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Sua senha" autocomplete="off" required>
                        </div>
                    </div>
                    <button type="submit" class="login-btn" id="login-btn">Entrar</button>
                </form>
                <div class="error" id="loginErrorMsg"></div>
            </div>

            <!-- FORMULÁRIO DE CADASTRO -->
            <div id="signup" class="tab-content">
                <div class="login-header">
                    <div class="lumi-logo">
                    </div>
                    <h2>Crie sua conta!</h2>
                    <p>Junte-se à comunidade UniRead e comece sua jornada.</p>
                </div>

                <form id="signup-form">
                    <div class="input-group">
                        <label>Usuário</label>
                        <div class="input-field">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="signup-username" placeholder="Escolha um nome de usuário" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <div class="input-field">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="signup-email" placeholder="Seu email" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="signup-password" placeholder="Crie uma senha" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Confirmar Senha</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirm-password" placeholder="Confirme sua senha" autocomplete="off" required>
                        </div>
                    </div>

                    <button type="submit" class="login-btn" id="signup-btn">Cadastrar</button>
                </form>
                <div class="error" id="signupErrorMsg"></div>
            </div>
        </div>
    </div>
    <script src="src/Js/Login.js"></script>
</body>
</html>
