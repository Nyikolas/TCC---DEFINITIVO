<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lendo - UniRead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="src/css/estilos.css">
    <link rel="stylesheet" href="src/css/Leitura.css">

</head>

<body>

    <!-- BARRA DE PROGRESSO SUPERIOR -->
    <div class="barra-progresso-container">
        <div class="progresso-feita" id="progressoFeita"></div>
    </div>

    <!-- HEADER -->
    <header class="header-leitura">
        <div class="info-obra">
            <a href="index.html" class="btn-voltar" title="Voltar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <div class="obra-info-texto">
                <span class="titulo-manga" id="tituloManga">One Piece</span>
                <span class="capitulo-atual" id="capituloAtual">Capítulo 1000</span>
            </div>
        </div>

        <div class="header-centro">
            <select class="select-capitulo" id="selectCapitulo" title="Selecionar capítulo"></select>
        </div>

        <div class="controles-topo">
            <button class="icon-btn modo-btn" id="btnModoPaginas" title="Modo por páginas">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="7" rx="1" />
                    <rect x="3" y="14" width="18" height="7" rx="1" />
                </svg>
            </button>
            <button class="icon-btn modo-btn" id="btnModoScroll" title="Modo scroll contínuo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <polyline points="19 12 12 19 5 12" />
                </svg>
            </button>
            <button class="icon-btn" id="btnFavorito" title="Favoritar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                    </path>
                </svg>
            </button>
            <a href="Perfil.html" class="reader-profile" title="Perfil">
                <img id="fotoPerfilNav" src="https://i.pravatar.cc/40" alt="Foto de perfil">
            </a>
        </div>
    </header>

    <!-- WRAPPER PRINCIPAL -->
    <div class="reader-wrapper" id="readerWrapper">

        <!-- SIDEBAR DE CAPÍTULOS -->
        <aside class="sidebar-capitulos" id="sidebarCapitulos">
            <div class="sidebar-header">
                <span class="sidebar-titulo">Capítulos</span>
                <button class="icon-btn sidebar-close" id="btnCloseSidebar" title="Fechar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="sidebar-lista" id="sidebarLista"></div>
        </aside>

        <!-- ÁREA DO LEITOR -->
        <main class="leitor-container" id="leitorContainer">

            <div class="area-imagem" id="areaImagem">
                <img src="" alt="Página do Mangá" class="pagina-manga" id="paginaManga">
                <div class="imagem-erro" id="imagemErro" hidden>
                    <strong>Imagem indisponivel</strong>
                    <span>Use Proximo ou tente recarregar o capitulo.</span>
                </div>
            </div>

            <nav class="navegacao-paginas">
                <button class="btn-nav btn-anterior" id="btnAnterior">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Anterior
                </button>

                <div class="paginas-centro">
                    <span class="contagem-paginas" id="contagemPaginas">Página 1 / 1</span>
                    <div class="paginas-dots" id="paginasDots"></div>
                </div>

                <button class="btn-nav btn-proximo" id="btnProximo">
                    Próximo
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </nav>

        </main>
    </div>

    <!-- SEÇÃO DE COMENTÁRIOS -->
    <section class="comentarios-secao">
        <div class="comentarios-inner">

            <div class="comentarios-header">
                <h2 class="comentarios-titulo">
                    Comentários
                    <span class="comentarios-count" id="comentariosCount">0</span>
                </h2>
                <div class="comentarios-ordenar">
                    <button class="ordem-btn ativo" data-ordem="recentes">Recentes</button>
                    <button class="ordem-btn" data-ordem="curtidas">Curtidos</button>
                </div>
            </div>

            <div class="novo-comentario-box">
                <img class="form-avatar" id="formAvatar" src="https://i.pravatar.cc/40" alt="Seu avatar">
                <div class="form-direita">
                    <textarea id="inputComentario" class="comentario-input"
                        placeholder="O que você achou deste capítulo?" maxlength="500" rows="3"></textarea>
                    <div class="form-rodape">
                        <span class="char-count"><span id="charAtual">0</span>/500</span>
                        <button class="btn-enviar" id="btnEnviar">Publicar</button>
                    </div>
                </div>
            </div>

            <div class="comentarios-lista" id="comentariosLista">
                <div class="comentarios-vazio" id="comentariosVazio">
                    <div class="vazio-icone">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <p>Seja o primeiro a comentar!</p>
                </div>
            </div>

        </div>
    </section>

    <!-- MODAL DE DENÚNCIA -->
    <div class="modal-overlay" id="modalDenuncia" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-titulo">Denunciar comentário</h3>
                <button class="icon-btn" id="modalCancelar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <p class="modal-desc">Por que você quer denunciar este comentário?</p>
            <div class="denuncia-opcoes">
                <button class="denuncia-btn" data-motivo="Spam">Spam</button>
                <button class="denuncia-btn" data-motivo="Linguagem ofensiva">Linguagem ofensiva</button>
                <button class="denuncia-btn" data-motivo="Spoiler sem aviso">Spoiler sem aviso</button>
                <button class="denuncia-btn" data-motivo="Conteúdo inadequado">Conteúdo inadequado</button>
            </div>
        </div>
    </div>

    <script src="src/Js/Leitura.js"></script>
    <script src="src/Js/Comentarios.js"></script>
</body>

</html>
